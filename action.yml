name: 'Scan and Upload'
description: 'Performs scan with SARIF upload to GitHub Security'
author: 'Midnight'
branding:
  icon: 'shield'
  color: 'blue'

inputs:
  github_token:
    description: "GitHub token for API calls (optional)"
    required: false
    default: ""
  scorecard_checks:
    description: "Comma-separated list of Scorecard checks to run. If empty, all checks run. See https://github.com/ossf/scorecard#checks for available checks."
    required: false
    default: ""
  fail_severity:
    description: "Fail the action when scans report this severity or higher (e.g. critical, high, medium). This must be set on private repos."
    required: false
    default: "critical"

runs:
  using: 'composite'
  # recommended permissions to use:
  #
  # permissions:
  #   actions: read
  #   contents: read
  #   security-events: write
  #   statuses: write
  steps:
    - name: Install EarthBuild
      shell: bash
      run: |
        # renovate: datasource=github-releases packageName=EarthBuild/earthbuild
        earthbuild_version="v0.8.17"
        curl -fsSL -o /tmp/earth "https://github.com/EarthBuild/earthbuild/releases/download/${earthbuild_version}/earth-linux-amd64"
        echo "85b7f31020be220493c1ef89fe4e976985a72e54dd12b7dfcf17544c8d4fd880  /tmp/earth" | sha256sum -c --strict
        chmod 0755 /tmp/earth

    - name: Run scanners (parallel)
      continue-on-error: true
      shell: bash
      env:
        SCORECARD_CHECKS: ${{ inputs.scorecard_checks }}
      run: /tmp/earth "${{ github.action_path }}+scan" --SCORECARD_CHECKS="$SCORECARD_CHECKS"
      working-directory: ${{ github.workspace }}

    - name: Collect SARIF files
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
      run: |
        # EarthBuild's SAVE ARTIFACT AS LOCAL saves relative to the Earthfile's
        # directory, so SARIF files land in the action's directory. Copy them
        # into the workspace so subsequent steps (upload, fail-on-severity) find
        # them. When the action is used from its own repo, action_path equals
        # the workspace and this is a no-op.
        mkdir -p scan_reports
        src="$(realpath "$ACTION_PATH/scan_reports" 2>/dev/null || true)"
        dst="$(realpath scan_reports)"
        if [ -n "$src" ] && [ -d "$src" ] && [ "$src" != "$dst" ]; then
          cp -r "$src/." scan_reports/
        fi

    - name: Verify scan output
      shell: bash
      run: |
        count=$(find scan_reports -name '*.sarif' 2>/dev/null | wc -l)
        if [ "$count" -eq 0 ]; then
          echo "::error::No SARIF files produced — all scanners may have failed"
          exit 1
        fi
        echo "Found $count SARIF file(s)"

    - name: Upload SARIF files
      uses: github/codeql-action/upload-sarif@3d8036cf7fe7433e4a725cf513a6ea56c7fd0f14  #v2.25.0
      if: (success() || failure()) && github.event.repository.private == false
      continue-on-error: true
      with:
        sarif_file: scan_reports

    # Upload SARIF artifacts for private repositories
    - name: Upload SARIF artifacts
      if: (success() || failure()) && github.event.repository.private == true
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        name: sarif_reports
        path: scan_reports

    - name: Fail on severity
      shell: bash
      if: inputs.fail_severity != ''
      env:
        INPUT_SEVERITY: ${{ inputs.fail_severity }}
      run: ${{ github.action_path }}/scripts/fail-on-severity.sh "$INPUT_SEVERITY"
