name: 'Scan and Upload'
description: 'Performs scan with SARIF upload to GitHub Security'
author: 'Midnight'
branding:
  icon: 'shield'
  color: 'blue'

inputs:
  github_token:
    description: "GitHub token for API calls (optional)"
    required: false
    default: ""
  scorecard_checks:
    description: "Comma-separated list of Scorecard checks to run. If empty, all checks run. See https://github.com/ossf/scorecard#checks for available checks."
    required: false
    default: ""
  fail_severity:
    description: "Fail the action when scans report this severity or higher (e.g. critical, high, medium). This must be set on private repos."
    required: false
    default: "critical"

runs:
  using: 'composite'
  # recommended permissions to use:
  #
  # permissions:
  #   actions: read
  #   contents: read
  #   security-events: write
  #   statuses: write
  steps:
    - name: Install cosign (used by OpenGrep)
      uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003  #v4.1.1

    - name: Run OpenGrep
      continue-on-error: true
      shell: bash
      run: |
        mkdir -p scan_reports
        # renovate: datasource=github-releases packageName=opengrep/opengrep
        opengrep_version="4f7a31eb730a9c4e766ba52c0a12f610b0ca9e66"  # v1.16.5
        curl -fsSL "https://raw.githubusercontent.com/opengrep/opengrep/${opengrep_version}/install.sh" -o /tmp/opengrep-install.sh
        echo "5e5fdd35d0fff5fb7a7141b45e1f167abc7d1026b43bd2d31fa6611c515fd649  /tmp/opengrep-install.sh" | sha256sum -c --strict
        bash /tmp/opengrep-install.sh
        export PATH="$HOME/.opengrep/cli/latest:$PATH" && opengrep scan --config auto --taint-intrafile --dataflow-traces --force-color --sarif-output=scan_reports/opengrep.sarif

    # KICS disabled - checkmarx/kics-github-action repo was compromised on or
    # around 2026-03-23 ( https://www.wiz.io/blog/teampcp-attack-kics-github-action ). The action is back but we don't know what further compromises have happened - not to be trusted for now.
    # - name: Run KICS Scan
    #   continue-on-error: true
    #   uses: checkmarx/kics-github-action@05aa5eb70eede1355220f4ca5238d96b397e30a6  #v2.1.20
    #   with:
    #     path: '.'
    #     output_path: 'scan_reports'
    #     output_formats: 'json,sarif'
    #     fail_on: high
    #     enable_comments: ${{ github.event_name == 'pull_request' }}
    #     exclude_paths: '.git,node_modules,dist,build'

    # - name: Run Trivy vulnerability scanner
    #   continue-on-error: true
    #   uses: aquasecurity/trivy-action@e368e328979b113139d6f9068e03accaed98a518  #v0.34.1
    #   with:
    #     scan-type: 'fs'
    #     scanners: 'vuln,secret,misconfig'
    #     format: 'sarif'
    #     output: 'scan_reports/trivy-results.sarif'
    #     trivy-config: trivy.yml

    - name: Run Scorecard cli
      continue-on-error: true
      shell: bash
      env:
        GITHUB_AUTH_TOKEN: ${{ inputs.github_token }}
        SCORECARD_CHECKS: ${{ inputs.scorecard_checks }}
      run: |
        wget -q https://github.com/ossf/scorecard/releases/download/v5.4.0/scorecard_5.4.0_linux_amd64.tar.gz
        echo "e5183aeaa5aa548fbb7318a6deb3e1038be0ef9aca24e655422ae88dfbe67502  scorecard_5.4.0_linux_amd64.tar.gz" | sha256sum -c --strict
        tar -xf ./scorecard_5.4.0_linux_amd64.tar.gz scorecard
        CHECKS_ARG=""
        if [ -n "$SCORECARD_CHECKS" ]; then
          CHECKS_ARG="--checks $SCORECARD_CHECKS"
        fi
        ./scorecard --local . --format json --output scan_reports/scorecard-results.json $CHECKS_ARG

        echo "Converting Scorecard JSON to SARIF format"
        cat ./scan_reports/scorecard-results.json | jq -f ${{ github.action_path }}/scripts/scorecard.jq > scan_reports/scorecard-results.sarif

    - name: Upload SARIF files
      uses: github/codeql-action/upload-sarif@3d8036cf7fe7433e4a725cf513a6ea56c7fd0f14  #v2.25.0
      if: (success() || failure()) && github.event.repository.private == false
      continue-on-error: true
      with:
        sarif_file: scan_reports

    # Upload SARIF artifacts for private repositories
    - name: Upload SARIF artifacts
      if: (success() || failure()) && github.event.repository.private == true
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  #v7.0.0
      with:
        name: sarif_reports
        path: scan_reports

    - name: Fail on severity
      shell: bash
      if: inputs.fail_severity != ''
      env:
        INPUT_SEVERITY: ${{ inputs.fail_severity }}
      run: ${{ github.action_path }}/scripts/fail-on-severity.sh "$INPUT_SEVERITY"
